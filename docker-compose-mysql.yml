services:
  mysql:
    image: 'mysql:8.0.31'
    container_name: mysql
    privileged: true
    command: ["mysqld"]
    volumes:
      - ./mysql/data/:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/my.cnf:/etc/mysql/my.cnf
    ports:
      - "${MYSQL_PORT}:3306"
    env_file:
      - env/mysql.env