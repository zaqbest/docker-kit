services:
  trojan-go:
    image: p4gefau1t/trojan-go:latest
    container_name: trojan-go
    restart: always
    networks:
      - docker-kit-network
    ports:
      # 宿主端口从 .env 取，容器内固定 443
      - "${TROJAN_GO_PORT}:443"
    environment:
      TROJAN_GO_PASSWORD: ${TROJAN_GO_PASSWORD}
      TROJAN_GO_HOSTNAME: ${TROJAN_GO_HOSTNAME}
      TROJAN_GO_FALLBACK_HOST: ${TROJAN_GO_FALLBACK_HOST}
      TROJAN_GO_FALLBACK_PORT: ${TROJAN_GO_FALLBACK_PORT}
    volumes:
      # 模板只读挂进来，启动时替换占位符生成真正的 config.json
      - ./trojan-go/config.template.json:/etc/trojan-go/config.template.json:ro
      # 复用仓库共享的自签证书。生产环境请换 Let's Encrypt 证书。
      - ./certs:/etc/trojan-go/certs:ro
    # 启动时把模板里的占位符替换成 env 值（$$ 是 docker-compose 里 $ 的转义，
    # 让 sed 在容器 shell 里读环境变量而不是被 compose 二次插值），
    # 生成 /tmp/config.json 再交给 trojan-go。
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        sed -e "s|__TROJAN_GO_PASSWORD__|$${TROJAN_GO_PASSWORD}|g" \
            -e "s|__TROJAN_GO_HOSTNAME__|$${TROJAN_GO_HOSTNAME}|g" \
            -e "s|__TROJAN_GO_FALLBACK_HOST__|$${TROJAN_GO_FALLBACK_HOST}|g" \
            -e "s|\"__TROJAN_GO_FALLBACK_PORT__\"|$${TROJAN_GO_FALLBACK_PORT}|g" \
            /etc/trojan-go/config.template.json > /tmp/config.json
        exec trojan-go -config /tmp/config.json

networks:
  docker-kit-network:
    external: true
