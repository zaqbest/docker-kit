# 通用自定义错误页面 snippet
# 用法：在 server {} 块中通过 include /etc/nginx/snippets/error-pages.conf; 引入
#
# - 400/401/403/404/405 等客户端错误 -> /404.html
# - 500/502/503/504 等服务端错误     -> /50x.html
# - 静态错误页文件位于 /usr/share/nginx/html/errors/ 下
# - 使用 internal 防止被外部直接访问

error_page 400 401 402 403 404 405 406 408 410 414 /404.html;
error_page 500 501 502 503 504 505 /50x.html;

location = /404.html {
    root /usr/share/nginx/html/errors;
    internal;
}

location = /50x.html {
    root /usr/share/nginx/html/errors;
    internal;
}