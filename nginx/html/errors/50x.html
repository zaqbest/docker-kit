<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5xx - Service Sank</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #fff;
            overflow: hidden;
        }
        body {
            min-height: 100vh;
            /* 更深的海底渐变，区别于 404 */
            background: linear-gradient(180deg, #1e88c8 0%, #0d3b5c 100%);
            background-image:
                radial-gradient(ellipse at center, rgba(255,255,255,0.06) 0%, transparent 60%),
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 100'><path d='M0 60 Q 25 40 50 60 T 100 60 T 150 60 T 200 60' stroke='%23ffffff' stroke-width='1.5' fill='none' opacity='0.12'/><path d='M0 80 Q 25 60 50 80 T 100 80 T 150 80 T 200 80' stroke='%23ffffff' stroke-width='1.5' fill='none' opacity='0.10'/></svg>"),
                linear-gradient(180deg, #1e88c8 0%, #0d3b5c 100%);
            background-size: auto, 240px 120px, auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .art {
            width: min(520px, 82vw);
            height: auto;
            margin-bottom: 24px;
            animation: sway 5s ease-in-out infinite;
            transform-origin: center bottom;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-2deg) translateY(0); }
            50%      { transform: rotate(2deg) translateY(-8px); }
        }
        h1 {
            font-size: clamp(20px, 4vw, 32px);
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
            padding: 0 16px;
        }
        p {
            margin-top: 12px;
            font-size: 14px;
            opacity: 0.75;
            text-align: center;
            padding: 0 16px;
        }
        .actions { margin-top: 28px; }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 999px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1px;
            transition: all 0.25s;
            cursor: pointer;
        }
        .btn:hover {
            background: rgba(255,255,255,0.15);
        }
        /* 从底部升起的气泡 */
        .bubbles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bubbles i {
            position: absolute;
            bottom: -40px;
            width: 12px; height: 12px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            animation: rise linear infinite;
        }
        .bubbles i:nth-child(1) { left: 12%; width: 8px;  height: 8px;  animation-duration: 9s;  animation-delay: 0s; }
        .bubbles i:nth-child(2) { left: 28%; width: 14px; height: 14px; animation-duration: 11s; animation-delay: 2s; }
        .bubbles i:nth-child(3) { left: 45%; width: 6px;  height: 6px;  animation-duration: 7s;  animation-delay: 1s; }
        .bubbles i:nth-child(4) { left: 62%; width: 10px; height: 10px; animation-duration: 10s; animation-delay: 4s; }
        .bubbles i:nth-child(5) { left: 78%; width: 16px; height: 16px; animation-duration: 12s; animation-delay: 3s; }
        .bubbles i:nth-child(6) { left: 90%; width: 7px;  height: 7px;  animation-duration: 8s;  animation-delay: 5s; }
        @keyframes rise {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            10%  { opacity: 0.6; }
            100% { transform: translateY(-105vh) translateX(20px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bubbles"><i></i><i></i><i></i><i></i><i></i><i></i></div>

    <!-- 5 🚢 xx : 中间是一艘正在下沉的船 -->
    <svg class="art" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
        <!-- 左侧的 5 -->
        <text x="0" y="220" fill="#ffffff" font-family="Helvetica, Arial, sans-serif"
              font-size="260" font-weight="700">5</text>
        <!-- 右侧的 xx（小写强调"未知错误码"） -->
        <text x="410" y="220" fill="#ffffff" font-family="Helvetica, Arial, sans-serif"
              font-size="200" font-weight="700">xx</text>

        <!-- 中间的沉船 -->
        <g transform="translate(215,60)">
            <!-- 桅杆 -->
            <line x1="90" y1="0" x2="90" y2="70" stroke="#8b5a2b" stroke-width="4" stroke-linecap="round"/>
            <!-- 顶部三角旗 -->
            <path d="M90 5 L110 12 L90 20 Z" fill="#e94b4b"/>
            <!-- 帆（撕裂状） -->
            <path d="M92 15 L140 25 L138 55 L92 60 Z" fill="#f4ede0" stroke="#c8bfa8" stroke-width="1.5"/>
            <path d="M110 25 L120 40 L115 55" stroke="#c8bfa8" stroke-width="1.5" fill="none"/>
            <!-- 船体 -->
            <path d="M30 90
                     L150 90
                     L135 145
                     L45 145 Z"
                  fill="#a8683a" stroke="#6b3f1e" stroke-width="2" stroke-linejoin="round"/>
            <!-- 船身横线 -->
            <line x1="34" y1="105" x2="146" y2="105" stroke="#6b3f1e" stroke-width="1.5"/>
            <!-- 舷窗 -->
            <circle cx="60" cy="120" r="6" fill="#0d3b5c" stroke="#f4c86b" stroke-width="2"/>
            <circle cx="90" cy="120" r="6" fill="#0d3b5c" stroke="#f4c86b" stroke-width="2"/>
            <circle cx="120" cy="120" r="6" fill="#0d3b5c" stroke="#f4c86b" stroke-width="2"/>
            <!-- 水下部分渐深 -->
            <path d="M45 145 L135 145 L128 170 L52 170 Z" fill="#7a4a25" opacity="0.85"/>
        </g>
    </svg>

    <h1>The service has sunk to the seabed.</h1>
    <p>后端暂时无法响应，请稍后再试</p>
    <div class="actions">
        <a class="btn" href="javascript:location.reload()">↻ 重新加载</a>
    </div>
</body>
</html>
