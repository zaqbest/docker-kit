# Override 文件：selfsigned 套件下 Kibana → ES 的 CA 信任链补丁。
#
# 为什么单独放一个 override 而不是内联到主 compose：
#   letsencrypt 场景不能显式指定 certificateAuthorities（会破坏 LE 交叉签的
#   锚点校验，见 env/kibana.env 注释），所以只在切到 selfsigned 时叠加它。
#
# 使用：
#   docker compose --env-file .env --env-file .env.localtest \
#     -f docker-compose-elasticsearch.yml \
#     -f docker-compose-elasticsearch.selfsigned.yml up -d

services:
  kibana:
    environment:
      ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES: /usr/share/kibana/config/certs/selfsigned/ca/public-ca.crt
