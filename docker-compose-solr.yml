services:
  solr:
    image: solr:8.11.2
    networks:
      - docker-kit-network
    ports:
      - "${SOLR_HTTP_PORT}:8983"
    env_file:
      - env/solr.env
    volumes:
      # Solr 数据（cores、config、logs）—— /var/solr 是官方镜像的数据主目录
      - ./solr/data:/var/solr
    depends_on:
      - solr_zk
    command: >
      bash -lc "
      solr zk mkroot -z solr_zk:2181 /ENGCD-search/cluster1 || true &&
      solr start -f -h 198.18.0.1"

  solr_zk:
    image: zookeeper:3.9
    networks:
      - docker-kit-network
    ports:
      - "${SOLR_ZK_PORT}:2181"
    env_file:
      - env/solr_zk.env
    volumes:
      # Zookeeper 状态：/data 存快照，/datalog 存事务日志
      - ./solr/zk/data:/data
      - ./solr/zk/datalog:/datalog

networks:
  docker-kit-network:
    external: true