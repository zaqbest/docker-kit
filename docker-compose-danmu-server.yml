version: "3.8"
services:
  danmu-app:
    image: l429609201/misaka_danmu_server:latest
    container_name: misaka-danmu-server
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=0022
      - TZ=Asia/Shanghai
      # --- 数据库连接配置 ---
      - DANMUAPI_DATABASE__TYPE=mysql
      # host.docker.internal 指向宿主机；Linux 上需要下面的 extra_hosts 才可用
      - DANMUAPI_DATABASE__HOST=host.docker.internal
      - DANMUAPI_DATABASE__PORT=${MYSQL_PORT}
      - DANMUAPI_DATABASE__NAME=danmuapi
      # !!! 重要：请使用上面mysql容器相同的用户名和密码 !!!
      - DANMUAPI_DATABASE__USER=danmuapi
      - DANMUAPI_DATABASE__PASSWORD=rikei1234
      # --- 缓存配置（可选）---
      # 默认使用 hybrid 模式（内存 L1 + 数据库 L2），无需额外服务
      # 可选后端: memory（纯内存）/ redis / database（纯数据库）/ hybrid（默认）
      # - DANMUAPI_CACHE__BACKEND=redis
      # - DANMUAPI_CACHE__REDIS_URL=redis://:your_password@redis:6379/0
      # - DANMUAPI_CACHE__REDIS_MAX_MEMORY=256mb
      # - DANMUAPI_CACHE__REDIS_SOCKET_TIMEOUT=30
      # - DANMUAPI_CACHE__REDIS_SOCKET_CONNECT_TIMEOUT=5
      # - DANMUAPI_CACHE__MEMORY_MAXSIZE=1024
      # - DANMUAPI_CACHE__MEMORY_DEFAULT_TTL=600
      # --- 初始管理员配置 ---
      - DANMUAPI_ADMIN__INITIAL_USER=admin
    volumes:
      - ./danmu-server/config:/app/config
      # Docker 套接字映射 - 用于一键更新功能
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "7768:7768"
    extra_hosts:
      # Linux 上让 host.docker.internal 解析到宿主机 docker 网桥 IP
      # macOS / Windows 的 Docker Desktop 已内置此 DNS，这行是幂等的
      - "host.docker.internal:host-gateway"