services:
  kafka:
    image: wurstmeister/kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 0
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka.zaqbest.com:9092
      KAFKA_ZOOKEEPER_CONNECT: kafka_zk:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
    volumes:
      - ./kafka/kafka_data:/kafka
    depends_on:
      - kafka_zk

  kafka_zk:
    image: wurstmeister/zookeeper
    volumes:
      - ./kafka/zk_data:/data
    ports:
      - 2182:2181
