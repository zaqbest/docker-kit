services:

  # ─── Consul ───────────────────────────────────────────────────────────────
  consul_standalone:
    image: hashicorp/consul:latest
    container_name: consul-server
    restart: always
    ports:
      - "8500:8500"      # Web UI & API
      - "8600:8600/tcp"  # DNS (TCP)
      - "8600:8600/udp"  # DNS (UDP)
      - "8300:8300"      # Server RPC
      - "8301:8301"      # Serf LAN
      - "8301:8301/udp"  # Serf LAN (UDP)
      - "8302:8302"      # Serf WAN
      - "8302:8302/udp"  # Serf WAN (UDP)
    volumes:
      - ./data/consul_standalone/data:/consul/data
      - ./data/consul_standalone/config:/consul/config
    env_file:
      - env/consul.env
    command: "agent -server -ui -node=server-1 -bootstrap-expect=1 -client=0.0.0.0"

  # ─── Kafka ────────────────────────────────────────────────────────────────
  kafka:
    image: 'wurstmeister/kafka:2.13-2.8.1'
    ports:
      - '9092:9092'
    env_file:
      - env/kafka.env
    volumes:
      - ./kafka/kafka_data:/kafka
    depends_on:
      - kafka_zk

  kafka_zk:
    image: wurstmeister/zookeeper
    volumes:
      - ./data/kafka/zk_data:/data
    ports:
      - '2181:2181'

  # ─── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: 'mysql:8.0.31'
    container_name: mysql
    privileged: true
    command: ["mysqld"]
    volumes:
      - ./data/mysql/data/:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/my.cnf:/etc/mysql/my.cnf
    ports:
      - "3306:3306"
    env_file:
      - env/mysql.env

  # ─── Nacos ────────────────────────────────────────────────────────────────
  nacos:
    image: 'nacos/nacos-server:v2.1.0-slim'
    container_name: nacos
    privileged: true
    ports:
      - "0.0.0.0:8848:8848"
    env_file:
      - env/nacos.env
    depends_on:
      - mysql

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro

  # ─── Nexus ────────────────────────────────────────────────────────────────
  nexus:
    image: sonatype/nexus3
    restart: always
    env_file:
      - env/nexus.env
    volumes:
      - ./data/nexus/data:/nexus-data
      - ./nexus/nexus.vmoptions:/opt/sonatype/nexus/bin/nexus.vmoptions:ro
    mem_limit: 1700m
    ports:
      - "8081:8081"
      - "8085:8085"

  # ─── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: 'rabbitmq:management'
    container_name: rabbitmq
    privileged: true
    volumes:
      - ./data/rabbitmq/data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "25672:25672"
    env_file:
      - env/rabbitmq.env

  # ─── Solr ─────────────────────────────────────────────────────────────────
  solr:
    image: solr:8.11.2
    ports:
      - "8983:8983"
    env_file:
      - env/solr.env
    depends_on:
      - zoo
    command: >
      bash -lc "
      solr zk mkroot -z zoo:2181 /ENGCD-search/cluster1 || true &&
      solr start -f -h 198.18.0.1"

  zoo:
    image: zookeeper:3.9
    ports:
      - "2182:2181"
    env_file:
      - env/zoo.env
  # ─── Vaultwarden  ──────────────────────────────────────────────────────────
  vault:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    ports:
      - 127.0.0.1:6666:80             # 仅监听本地端口，由反向代理访问
    environment:
      DOMAIN: https://vault.zaqbest.com # 将这里替换为你的实际域名
      WEBSOCKET_ENABLED: "true"       # 开启 WebSocket，用于客户端实时同步
      # SIGNUPS_ALLOWED: "false"      # 关闭公开注册，生效需要删除前面的 #
      INVITATIONS_ALLOWED: "false"    # 关闭邀请功能
    volumes:
      - ./data/vault/data:/data
  gitea:
    image: docker.gitea.com/gitea:1.26.2
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    volumes:
      - ./data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:22"
