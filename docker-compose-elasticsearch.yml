services:
  elasticsearch:
    image: elasticsearch:8.19.14
    restart: always
    networks:
      - docker-kit-network
    ports:
      - "${ELASTICSEARCH_HTTP_PORT}:9200"
      - "${ELASTICSEARCH_TRANSPORT_PORT}:9300"
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
      - ./certs:/usr/share/elasticsearch/config/certs:ro
      - ./elasticsearch/plugins:/usr/share/elasticsearch/plugins:ro
      # 用户词典 / 连字模式等分析资源，analyzer 里通过 config/analysis/xxx 引用
      - ./elasticsearch/config/analysis:/usr/share/elasticsearch/config/analysis:ro
    env_file:
      - env/elasticsearch.env
    environment:
      # 由 ${ES_SSL_PROFILE} 选择证书套件（letsencrypt / selfsigned）
      # 对应 certs/<profile>/server.{crt,key}
      xpack.security.http.ssl.certificate: certs/${ES_SSL_PROFILE:-letsencrypt}/server.crt
      xpack.security.http.ssl.key: certs/${ES_SSL_PROFILE:-letsencrypt}/server.key
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  kibana:
    image: kibana:8.19.14
    restart: always
    networks:
      - docker-kit-network
    ports:
      - "${KIBANA_PORT}:5601"
    volumes:
      - ./certs:/usr/share/kibana/config/certs:ro
    env_file:
      - env/kibana.env
    environment:
      # 由 ${KIBANA_SSL_PROFILE} 选择证书套件
      SERVER_SSL_CERTIFICATE: /usr/share/kibana/config/certs/${KIBANA_SSL_PROFILE:-letsencrypt}/server.crt
      SERVER_SSL_KEY: /usr/share/kibana/config/certs/${KIBANA_SSL_PROFILE:-letsencrypt}/server.key
      # Kibana→ES 的 CA 信任链：letsencrypt 场景不显式配（走 Node.js Mozilla 信任库，
      # 见 env/kibana.env 注释）；selfsigned 场景请用 docker-compose-elasticsearch.selfsigned.yml
      # override 追加 ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES。
    depends_on:
      - elasticsearch

networks:
  docker-kit-network:
    external: true
